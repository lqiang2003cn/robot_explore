model:
  policy_type: smolvla             # smolvla | act | diffusion
  pretrained_path: "lerobot/smolvla_base"
  action_dim: 6                    # 5 arm joints + 1 gripper (joint-space)
  task: "pick up the red cube"

simulation:
  model_path: models/x3plus_mujoco.xml
  timestep: 0.002
  camera_name: front_cam
  camera_resolution: [256, 256]    # LeRobot policies expect 256x256
  max_episode_steps: 400
  control_dt: 0.05                 # policy query interval (20 Hz)
  video_fps: 30
  frame_skip: 2                    # capture every Nth step (lower = smoother)

dataset:
  repo_id: "local/x3plus_pick_cube"
  repo_id_ros2: "local/x3plus_ros2"  # dataset ID for ROS2-recorded episodes
  num_episodes: 100
  place_position: [0.15, -0.15, 0.39]

ros2:
  # Activation: source /opt/ros/jazzy/setup.bash && source activate_env.sh vla_x3plus
  # Bridge:   python -m src.mujoco_bridge_node
  # Recorder: python -m src.record_dataset_ros2 --num-episodes 100
  topics:
    joint_states: "/joint_states"
    joint_command: "/joint_command"
    cube_pose: "/cube_pose"
    target_place_pose: "/target_place_pose"
    front_cam_image: "/front_cam/image_raw"
    task_complete: "/task_complete"

training:
  pretrained_path: "lerobot/smolvla_base"
  batch_size: 32
  steps: 20000
  output_dir: "outputs/train/smolvla_x3plus"

output_dir: output
