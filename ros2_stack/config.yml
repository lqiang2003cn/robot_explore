# ROS2 stack configuration
# Each robot section defines task parameters used by BT nodes.

franka:
  cube_position: [0.4, 0.12, 0.45]
  place_position: [0.4, -0.25, 0.45]
  grasp_offset_z: 0.04
  gripper_open: 0.04
  gripper_closed: 0.001
  settle_time: 0.5
  lift_height: 0.15

x3plus:
  # Two-block task: pick yellow, place on red (both randomly placed).
  # Full BT configuration lives in x3plus_pick_place/config/pick_place_tree.yaml.
  gripper_open: -1.54           # grip_joint open position
  gripper_closed: 0.0           # grip_joint closed position
  settle_time: 0.5
  lift_height: 0.05
